<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart & Store Integration — SellerActions</title>
  <meta name="description" content="Connect your e-commerce store and start your 14-day free trial with SellerActions micro-SaaS tools.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav" id="mainNav"></nav>

<section class="cart-page">
  <div class="container">
    <div class="section-header">
      <h2 id="cartPageTitle">Your Cart</h2>
      <p id="cartPageDesc">Review your selected tools and connect your store to start the 14-day free trial.</p>
    </div>

    <!-- Steps indicator (built dynamically based on cart contents) -->
    <div class="cart-steps" id="cartSteps"></div>

    <!-- Cart content container -->
    <div class="cart-content" id="cartContent"></div>
  </div>
</section>

<footer class="footer" id="mainFooter"></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
<script src="js/data.js"></script>
<script src="js/db.js"></script>
<script src="js/app.js"></script>
<script>
  renderNav('');
  renderFooter();

  let currentStep = 1;
  let selectedStore = null;
  const cartContent = document.getElementById('cartContent');

  // Get current page URL for magic link redirect
  const REDIRECT_URL = window.location.origin + window.location.pathname;

  // Check if any cart item requires extra integrations
  function getRequiredIntegrations() {
    const items = Cart.getProducts();
    const integrations = [];
    items.forEach(p => {
      if (p.integrations && p.integrations.length > 0) {
        p.integrations.forEach(intg => {
          integrations.push({ ...intg, productSlug: p.slug, productName: p.name });
        });
      }
    });
    return integrations;
  }

  function hasIntegrationStep() {
    return getRequiredIntegrations().length > 0;
  }

  // Dynamic step mapping: steps change based on whether integration step is needed
  function getStepConfig() {
    const base = [
      { id: 'cart', label: 'Review Cart' },
      { id: 'signin', label: 'Sign In' },
      { id: 'connect', label: 'Connect Store' }
    ];
    if (hasIntegrationStep()) {
      base.push({ id: 'integrations', label: 'Extra Setup' });
    }
    base.push({ id: 'success', label: 'Start Trial' });
    return base;
  }

  function renderStepsIndicator() {
    const steps = getStepConfig();
    document.getElementById('cartSteps').innerHTML = steps.map((s, i) => `
      <div class="cart-step ${i + 1 === currentStep ? 'active' : ''} ${i + 1 < currentStep ? 'completed' : ''}" data-step="${i + 1}">
        <div class="cart-step-num">${i + 1}</div>
        <span class="cart-step-label">${s.label}</span>
      </div>
    `).join('');
  }

  function getCurrentStepId() {
    const steps = getStepConfig();
    return steps[currentStep - 1]?.id || 'cart';
  }

  function setStep(step) {
    currentStep = step;
    renderStepsIndicator();
    renderStep();
  }

  function renderStep() {
    const stepId = getCurrentStepId();
    if (stepId === 'cart') renderCartStep();
    else if (stepId === 'signin') renderSignInStep();
    else if (stepId === 'connect') renderIntegrationStep();
    else if (stepId === 'integrations') renderExtraSetupStep();
    else if (stepId === 'success') renderSuccessStep();
  }

  function getNextStep() { return currentStep + 1; }
  function getPrevStep() { return currentStep - 1; }

  // ===== STEP 1: CART REVIEW =====
  function renderCartStep() {
    document.getElementById('cartPageTitle').textContent = 'Your Cart';
    document.getElementById('cartPageDesc').textContent = 'Review your selected tools and connect your store to start the 14-day free trial.';

    const items = Cart.getProducts();

    if (items.length === 0) {
      cartContent.innerHTML = `
        <div class="cart-empty">
          <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/>
          </svg>
          <h3>Your cart is empty</h3>
          <p>Browse our tools and add the ones you need. Every tool includes a 14-day free trial.</p>
          <a href="index.html#bundle" class="btn-primary">Browse Tools</a>
        </div>
      `;
      return;
    }

    const hasDiscount = Discount.applies(items.length);

    const itemsHtml = items.map(p => {
      const cat = CATEGORIES[p.cat];
      const priceDisplay = hasDiscount
        ? `<span class="price-original">${p.priceLabel}</span><span class="price-discounted">$${Discount.calculate(p.price, items.length).toFixed(2)}/mo</span><span class="discount-tag">-${Discount.PERCENT}%</span>`
        : `${p.priceLabel}`;
      return `
        <div class="cart-item">
          <div class="cart-item-icon" style="background:${getIconGradient(p.cat)}">${cat?.icon || '🔧'}</div>
          <div class="cart-item-info">
            <div class="cart-item-name">${p.name}</div>
            <div class="cart-item-cat">${cat?.name || p.cat} · ${p.platforms.map(pl => getPlatformName(pl)).join(', ')}</div>
          </div>
          <div class="cart-item-price">${priceDisplay}</div>
          <button class="cart-item-remove" onclick="removeFromCart('${p.slug}')" title="Remove">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      `;
    }).join('');

    const discountBannerHtml = hasDiscount
      ? `<div style="background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.25);border-radius:10px;padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;gap:10px;">
          <span class="discount-badge">BUNDLE DEAL</span>
          <span style="font-size:0.88rem;color:var(--yellow);font-weight:600;">${Discount.PERCENT}% off applied — you have ${items.length} tools in your cart!</span>
        </div>`
      : (items.length === 1
        ? `<div style="background:var(--accent-glow);border:1px solid rgba(0,194,209,0.15);border-radius:10px;padding:14px 20px;margin-bottom:16px;font-size:0.88rem;color:var(--accent);">
            Add 1 more tool to unlock <strong>50% off</strong> on all tools after your free trial!
          </div>`
        : '');

    const totalOriginal = items.reduce((sum, p) => sum + p.price, 0);
    const totalAfterDiscount = hasDiscount ? totalOriginal * (1 - Discount.PERCENT / 100) : totalOriginal;

    cartContent.innerHTML = `
      ${discountBannerHtml}
      ${itemsHtml}
      <div class="cart-summary">
        <div class="cart-summary-row">
          <span class="label">Tools selected</span>
          <span class="value">${items.length}</span>
        </div>
        <div class="cart-summary-row">
          <span class="label">Trial period</span>
          <span class="value" style="color:var(--accent);">14 days free</span>
        </div>
        ${hasDiscount ? `<div class="cart-summary-row">
          <span class="label">Bundle discount</span>
          <span class="value" style="color:var(--yellow);">-${Discount.PERCENT}%</span>
        </div>` : ''}
        <div class="cart-summary-row total">
          <span class="label">After trial</span>
          <span class="value" style="color:var(--green);">
            ${hasDiscount ? `<span class="price-original">$${totalOriginal.toFixed(2)}/mo</span> ` : ''}$${totalAfterDiscount.toFixed(2)}/mo
          </span>
        </div>
        <div class="cart-trial-note">
          All tools come with a 14-day free trial. No credit card required to start.
        </div>
      </div>
      <div style="display:flex; gap:12px; margin-top:24px; justify-content:space-between; align-items:center;">
        <div style="display:flex; gap:12px; align-items:center;">
          <a href="index.html#bundle" class="btn-ghost">${items.length < 2 ? 'Add More for 50% Off' : 'Continue Browsing'}</a>
          <button class="btn-ghost" style="color:var(--red); font-size:0.82rem;" onclick="clearCart()">Clear All</button>
        </div>
        <button class="btn-primary" onclick="proceedToSignIn()">Continue &rarr;</button>
      </div>
    `;
  }

  function clearCart() {
    Cart.clear();
    Toast.show('Cart Cleared', 'All tools removed from cart.', 'info');
    renderCartStep();
  }

  function removeFromCart(slug) {
    Cart.removeItem(slug);
    const product = getProductBySlug(slug);
    Toast.show('Removed', `${product?.name || 'Tool'} removed from cart.`, 'info');
    renderCartStep();
  }

  // Find step number by id
  function stepNumFor(id) {
    return getStepConfig().findIndex(s => s.id === id) + 1;
  }

  // Check if already logged in, skip sign-in step
  async function proceedToSignIn() {
    try {
      const user = await Auth.getUser();
      if (user) {
        await saveSubscriptions();
        setStep(stepNumFor('connect'));
        return;
      }
    } catch {}
    setStep(stepNumFor('signin'));
  }

  // ===== STEP 2: SIGN IN (Magic Link) =====
  function renderSignInStep() {
    document.getElementById('cartPageTitle').textContent = 'Sign In to Continue';
    document.getElementById('cartPageDesc').textContent = 'We\'ll send you a magic link — no password needed.';

    cartContent.innerHTML = `
      <div class="auth-form">
        <div class="form-group">
          <label for="authEmail">Email Address</label>
          <input type="email" id="authEmail" placeholder="you@example.com">
        </div>
        <div style="display:flex; gap:12px; margin-top:24px; justify-content:space-between;">
          <button class="btn-ghost" onclick="setStep(stepNumFor('cart'))">Back</button>
          <button class="btn-primary" id="sendMagicLinkBtn" onclick="sendMagicLink()">Send Magic Link &rarr;</button>
        </div>
      </div>
    `;
  }

  async function sendMagicLink() {
    const email = document.getElementById('authEmail')?.value?.trim();
    if (!email || !email.includes('@')) {
      Toast.show('Invalid Email', 'Please enter a valid email address.', 'info');
      return;
    }

    const btn = document.getElementById('sendMagicLinkBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; }

    try {
      await Auth.signInWithMagicLink(email, REDIRECT_URL);

      // Save cart to localStorage so it survives the redirect
      localStorage.setItem('sa_pending_email', email);

      // Show "check your email" screen
      cartContent.innerHTML = `
        <div class="magic-link-sent">
          <div class="mail-icon">📧</div>
          <h3>Check Your Email</h3>
          <p>
            We sent a magic link to <span class="email-highlight">${email}</span>.<br>
            Click the link in the email to sign in and continue.
          </p>
          <p style="margin-top:16px; font-size:0.82rem; color:var(--text-muted);">
            Didn't receive it? Check your spam folder or
            <a href="#" onclick="event.preventDefault(); renderSignInStep();" style="color:var(--accent);">try again</a>.
          </p>
        </div>
      `;
    } catch (e) {
      console.error('Magic link error:', e);
      Toast.show('Error', e.message || 'Failed to send magic link. Please try again.', 'error');
      if (btn) { btn.disabled = false; btn.textContent = 'Send Magic Link →'; }
    }
  }

  // ===== STEP 3: CONNECT STORE =====
  async function renderIntegrationStep() {
    const items = Cart.getProducts();
    const allPlatforms = [...new Set(items.flatMap(p => p.platforms))];

    const storeOptions = [
      { id: 'amazon', name: 'Amazon', icon: '📦', desc: 'Seller Central / SP-API' },
      { id: 'shopify', name: 'Shopify', icon: '🛍️', desc: 'Shopify Admin API' },
      { id: 'walmart', name: 'Walmart', icon: '🏪', desc: 'Walmart Marketplace' },
      { id: 'ebay', name: 'eBay', icon: '🏷️', desc: 'eBay Developer API' },
      { id: 'tiktok', name: 'TikTok Shop', icon: '🎵', desc: 'TikTok Seller Center' },
      { id: 'other', name: 'Other / Later', icon: '⏭️', desc: 'Skip for now' }
    ];

    const relevantStores = storeOptions.filter(s =>
      s.id === 'other' || allPlatforms.includes(s.id) || allPlatforms.includes('multi')
    );

    document.getElementById('cartPageTitle').textContent = 'Connect Your Store';
    document.getElementById('cartPageDesc').textContent = 'Select the platform you want to connect first. You can add more later.';

    cartContent.innerHTML = `
      <div class="store-options" id="storeOptions">
        ${relevantStores.map(s => `
          <div class="store-option" data-store="${s.id}" onclick="selectStore('${s.id}')">
            <div class="store-option-icon">${s.icon}</div>
            <div class="store-option-name">${s.name}</div>
            <div class="store-option-desc">${s.desc}</div>
          </div>
        `).join('')}
      </div>

      <div id="integrationForm" style="display:none;">
        <div class="integration-form">
          <div class="form-group">
            <label for="storeName">Store / Seller Name</label>
            <input type="text" id="storeName" placeholder="e.g. My Brand Store">
          </div>
        </div>
      </div>

      <div style="display:flex; gap:12px; margin-top:32px; justify-content:space-between;">
        <button class="btn-ghost" onclick="setStep(stepNumFor('cart'))">Back to Cart</button>
        <button class="btn-primary" id="continueBtn" onclick="handleIntegrationSubmit()" disabled>Continue &rarr;</button>
      </div>
    `;
  }

  function selectStore(storeId) {
    selectedStore = storeId;
    document.querySelectorAll('.store-option').forEach(el => {
      el.classList.toggle('selected', el.dataset.store === storeId);
    });

    const form = document.getElementById('integrationForm');
    const continueBtn = document.getElementById('continueBtn');
    continueBtn.disabled = false;

    if (storeId === 'other') {
      form.style.display = 'none';
      return;
    }

    form.style.display = 'block';
  }

  async function handleIntegrationSubmit() {
    if (!selectedStore) {
      Toast.show('Select a Store', 'Please select which platform to connect.', 'info');
      return;
    }

    const storeName = document.getElementById('storeName')?.value?.trim() || '';

    const btn = document.getElementById('continueBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Connecting...'; }

    // Redirect to Amazon OAuth
    if (selectedStore === 'amazon') {
      // Save store name for OAuth callback
      localStorage.setItem('sa_signup_store', storeName);

      const state = encodeURIComponent(storeName || 'seller');
      const appId = 'amzn1.sp.solution.4744b25e-cf83-49bc-a0a3-d0b36118ee3f';
      const returnTo = encodeURIComponent(`/apps/authorize/consent?application_id=${appId}&version=beta&state=${state}`);
      window.location.href = `https://sellercentral.amazon.com/account-switcher/default/merchantMarketplace?returnTo=${returnTo}`;
      return;
    }

    // For other platforms, save subscriptions and go to next step
    await saveSubscriptions();
    goAfterConnect();
  }

  // After Connect Store: go to integration step if needed, otherwise success
  function goAfterConnect() {
    if (hasIntegrationStep()) {
      setStep(stepNumFor('integrations'));
    } else {
      setStep(stepNumFor('success'));
    }
  }

  // ===== EXTRA SETUP STEP: Collect third-party API keys =====
  function renderExtraSetupStep() {
    const integrations = getRequiredIntegrations();

    // Group by platform
    const grouped = {};
    integrations.forEach(intg => {
      const key = intg.platform;
      if (!grouped[key]) grouped[key] = { platform: key, productName: intg.productName, productSlug: intg.productSlug, fields: [] };
      grouped[key].fields.push(intg);
    });

    document.getElementById('cartPageTitle').textContent = 'Extra Setup';
    document.getElementById('cartPageDesc').textContent = 'Some of your selected tools require additional credentials to connect.';

    const platformSections = Object.values(grouped).map(group => {
      const fieldsHtml = group.fields.map(f => `
        <div class="form-group">
          <label for="intg_${f.platform}_${f.field}">${f.label}</label>
          <input type="${f.type || 'text'}" id="intg_${f.platform}_${f.field}" placeholder="${f.placeholder || ''}" data-platform="${f.platform}" data-field="${f.field}" ${f.required ? 'required' : ''}>
          ${f.helpText ? `<small style="color:var(--text-muted); font-size:0.78rem; margin-top:4px; display:block;">${f.helpText}</small>` : ''}
        </div>
      `).join('');

      return `
        <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:16px;">
          <h4 style="margin-bottom:4px; font-size:0.95rem;">${group.platform.charAt(0).toUpperCase() + group.platform.slice(1)} Integration</h4>
          <p style="color:var(--text-muted); font-size:0.82rem; margin-bottom:16px;">Required for: ${group.productName}</p>
          ${fieldsHtml}
        </div>
      `;
    }).join('');

    cartContent.innerHTML = `
      <div class="integration-setup-form">
        ${platformSections}
      </div>
      <div style="display:flex; gap:12px; margin-top:24px; justify-content:space-between;">
        <button class="btn-ghost" onclick="setStep(stepNumFor('connect'))">Back</button>
        <div style="display:flex; gap:12px;">
          <button class="btn-ghost" onclick="skipExtraSetup()">Skip for Now</button>
          <button class="btn-primary" id="saveIntegrationsBtn" onclick="saveExtraSetup()">Save & Continue &rarr;</button>
        </div>
      </div>
    `;
  }

  function skipExtraSetup() {
    setStep(stepNumFor('success'));
  }

  async function saveExtraSetup() {
    const integrations = getRequiredIntegrations();
    const btn = document.getElementById('saveIntegrationsBtn');

    // Collect values grouped by platform
    const platformData = {};
    let hasError = false;

    integrations.forEach(intg => {
      const input = document.getElementById(`intg_${intg.platform}_${intg.field}`);
      const value = input?.value?.trim() || '';
      if (intg.required && !value) {
        input.style.borderColor = 'var(--red)';
        hasError = true;
      } else if (input) {
        input.style.borderColor = '';
      }
      if (!platformData[intg.platform]) platformData[intg.platform] = {};
      platformData[intg.platform][intg.field] = value;
    });

    if (hasError) {
      Toast.show('Required Fields', 'Please fill in all required fields.', 'info');
      return;
    }

    if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }

    // Save each platform's credentials
    for (const [platform, fields] of Object.entries(platformData)) {
      try {
        await UserDB.saveIntegrationCredential(platform, fields);
      } catch (e) {
        console.warn(`Failed to save ${platform} credentials:`, e);
        // Store locally as fallback
        localStorage.setItem(`sa_intg_${platform}`, JSON.stringify(fields));
      }
    }

    Toast.show('Saved', 'Integration credentials saved successfully.', 'success');
    setStep(stepNumFor('success'));
  }

  // Save cart items as user subscriptions in DB
  async function saveSubscriptions() {
    const items = Cart.getProducts();
    if (items.length === 0) return;

    try {
      await UserDB.addSubscriptions(items);
    } catch (e) {
      console.warn('Failed to save subscriptions:', e);
    }
  }

  // ===== STEP 4: SUCCESS =====
  async function renderSuccessStep() {
    const items = Cart.getProducts();
    const user = await Auth.getUser();
    const storeName = selectedStore === 'other'
      ? 'your store'
      : (selectedStore ? (PLATFORMS[selectedStore]?.name || selectedStore) : 'your store');

    document.getElementById('cartPageTitle').textContent = 'You\'re All Set!';
    document.getElementById('cartPageDesc').textContent = '';
    document.querySelectorAll('.cart-step').forEach(el => {
      el.classList.add('completed');
    });

    // Build integration-specific messages
    const integrations = getRequiredIntegrations();
    const integrationMessages = integrations.length > 0
      ? integrations.map(intg => {
          const platformName = intg.platform.charAt(0).toUpperCase() + intg.platform.slice(1);
          return `<li style="display:flex; align-items:flex-start; gap:10px; font-size:0.88rem; color:var(--accent);">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0; margin-top:2px;"><path d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20 10 10 0 000-20z"/></svg>
            <span>After registration, you can check your ${platformName} data within 2 hours.</span>
          </li>`;
        }).filter((v, i, a) => a.indexOf(v) === i).join('')
      : '';

    cartContent.innerHTML = `
      <div class="success-container">
        <div class="success-icon">
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="48" height="48"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2>Your Free Trial Has Started!</h2>
        <p>
          ${user ? `Signed in as <strong>${user.email}</strong>.<br>` : ''}
          We're setting up <strong>${items.length} tool${items.length > 1 ? 's' : ''}</strong> for ${storeName}.
        </p>
        <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:24px; text-align:left; margin-bottom:32px;">
          <h4 style="margin-bottom:12px; font-size:0.92rem;">What happens next:</h4>
          <ul style="display:flex; flex-direction:column; gap:10px; list-style:none;">
            <li style="display:flex; align-items:flex-start; gap:10px; font-size:0.88rem; color:var(--text-secondary);">
              <svg width="18" height="18" fill="none" stroke="var(--green)" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0; margin-top:2px;"><polyline points="20 6 9 17 4 12"/></svg>
              <span>Your tools are now active in your dashboard</span>
            </li>
            <li style="display:flex; align-items:flex-start; gap:10px; font-size:0.88rem; color:var(--text-secondary);">
              <svg width="18" height="18" fill="none" stroke="var(--green)" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0; margin-top:2px;"><polyline points="20 6 9 17 4 12"/></svg>
              <span>Data will start syncing automatically once connected</span>
            </li>
            <li style="display:flex; align-items:flex-start; gap:10px; font-size:0.88rem; color:var(--text-secondary);">
              <svg width="18" height="18" fill="none" stroke="var(--green)" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0; margin-top:2px;"><polyline points="20 6 9 17 4 12"/></svg>
              <span>You'll be reminded before any charge at the end of your trial</span>
            </li>
            ${integrationMessages}
          </ul>
        </div>
        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
          <a href="dashboard.html" class="btn-primary">Go to Dashboard</a>
          <a href="index.html" class="btn-secondary">Back to Home</a>
        </div>
      </div>
    `;

    Cart.clear();
  }

  // ===== INIT: Handle magic link callback & auto-advance =====
  async function initCart() {
    renderStepsIndicator();
    try {
      // Check if returning from magic link (Supabase puts tokens in URL hash)
      if (window.location.hash && window.location.hash.includes('access_token')) {
        await new Promise(r => setTimeout(r, 500));

        const user = await Auth.getUser();
        if (user) {
          history.replaceState(null, '', window.location.pathname);
          // Save subscriptions immediately after login
          await saveSubscriptions();
          setStep(stepNumFor('connect'));
          return;
        }
      }
    } catch (e) {
      console.warn('Auth check failed:', e);
    }

    setStep(1);
  }

  initCart();
</script>
</body>
</html>
