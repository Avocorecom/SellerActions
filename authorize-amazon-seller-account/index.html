<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Authorization — SellerActions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
    <script type="text/javascript">(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);})(window, document, "clarity", "script", "vxlrzmr0dq");</script>
</head>
<body>

<nav class="nav" id="mainNav"></nav>

<section class="cart-page">
  <div class="container">
    <div class="section-header">
      <h2 id="authTitle">Connecting Your Amazon Account...</h2>
      <p id="authDesc">Please wait while we complete the authorization.</p>
    </div>

    <div class="cart-content" id="authContent">
      <div class="success-container" id="loadingState">
        <div class="success-icon" style="animation: pulse 1.5s ease-in-out infinite;">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.49-8.49l2.83-2.83M2 12h4m12 0h4m-3.93 7.07l-2.83-2.83M7.76 7.76L4.93 4.93"/>
          </svg>
        </div>
        <p style="color:var(--text-secondary);">Processing your Amazon authorization...</p>
      </div>
    </div>
  </div>
</section>

<footer class="footer" id="mainFooter"></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
<script src="../js/data.js"></script>
<script src="../js/db.js"></script>
<script src="../js/app.js"></script>
<script>
  renderNav('');
  renderFooter();

  const params = new URLSearchParams(window.location.search);
  const oauthCode = params.get('spapi_oauth_code');
  const state = params.get('state');
  const sellingPartnerId = params.get('selling_partner_id');
  const signupStore = localStorage.getItem('sa_signup_store') || '';

  async function processAuthorization() {
    const authContent = document.getElementById('authContent');
    const authTitle = document.getElementById('authTitle');
    const authDesc = document.getElementById('authDesc');

    if (!oauthCode) {
      showError(authTitle, authContent, 'No authorization code received from Amazon.');
      return;
    }

    const displayStore = signupStore || decodeURIComponent(state || '');

    // Save OAuth data to Supabase (keep existing behavior)
    const user = await Auth.getUser();
    if (user) {
      try {
        await UserDB.saveStoreCredential({
          platform: 'amazon',
          store_name: displayStore,
          selling_partner_id: sellingPartnerId || '',
          spapi_oauth_code: oauthCode,
          status: 'active'
        });
      } catch (e) {
        console.error('Failed to save store credential:', e);
      }
    } else {
      try {
        await db.insert('store_connections', {
          store_name: displayStore,
          platform: 'amazon',
          selling_partner_id: sellingPartnerId || '',
          spapi_oauth_code: oauthCode,
          state: state || '',
          status: 'active'
        });
      } catch (e) {
        console.error('Failed to save to store_connections:', e);
      }
    }

    localStorage.removeItem('sa_signup_store');

    // Show registration form
    authTitle.textContent = 'Amazon Account Connected!';
    authDesc.textContent = 'Complete your registration to start using SellerActions.';

    // Get cart items for service IDs
    const cartItems = Cart.getProducts();

    authContent.innerHTML = `
      <div class="success-container">
        <div class="success-icon">
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="48" height="48"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2>Your Amazon Account is Connected</h2>
        <p style="color:var(--text-secondary); margin-bottom:8px;">
          ${sellingPartnerId ? `Seller ID: <strong>${sellingPartnerId}</strong><br>` : ''}
          ${displayStore ? `Store: <strong>${displayStore}</strong>` : ''}
        </p>

        <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:28px; text-align:left; margin:24px 0; max-width:480px; width:100%;">
          <h4 style="margin-bottom:16px; font-size:1rem;">Complete Your Registration</h4>
          <div class="form-group" style="margin-bottom:14px;">
            <label for="regEmail">Email Address</label>
            <input type="email" id="regEmail" placeholder="you@example.com" value="${user?.email || ''}">
          </div>
          <div class="form-group" style="margin-bottom:14px;">
            <label for="regName">Full Name</label>
            <input type="text" id="regName" placeholder="John Doe">
          </div>
          <div class="form-group" style="margin-bottom:14px;">
            <label for="regCompany">Company / Store Name</label>
            <input type="text" id="regCompany" placeholder="My Brand" value="${displayStore}">
          </div>
          <div class="form-group" style="margin-bottom:14px;">
            <label for="regPassword">Password</label>
            <input type="password" id="regPassword" placeholder="Min 6 characters">
          </div>
          <div class="form-group" style="margin-bottom:20px;">
            <label for="regPasswordConfirm">Confirm Password</label>
            <input type="password" id="regPasswordConfirm" placeholder="Repeat password">
          </div>
          <button class="btn-primary btn-full" id="registerBtn" onclick="handleRegistration()">
            Create Account & Start Trial &rarr;
          </button>
          <p style="font-size:0.75rem; color:var(--text-muted); margin-top:10px; text-align:center;">
            Free trial — no credit card required.
          </p>
        </div>
      </div>
    `;
  }

  async function handleRegistration() {
    const email = document.getElementById('regEmail')?.value?.trim();
    const name = document.getElementById('regName')?.value?.trim();
    const companyName = document.getElementById('regCompany')?.value?.trim();
    const password = document.getElementById('regPassword')?.value;
    const passwordConfirm = document.getElementById('regPasswordConfirm')?.value;
    const btn = document.getElementById('registerBtn');

    // Validation
    if (!email || !name || !companyName || !password) {
      Toast.show('Missing Fields', 'Please fill in all fields.', 'info');
      return;
    }
    if (password.length < 6) {
      Toast.show('Weak Password', 'Password must be at least 6 characters.', 'info');
      return;
    }
    if (password !== passwordConfirm) {
      Toast.show('Password Mismatch', 'Passwords do not match.', 'info');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating your account...';

    try {
      const cartItems = Cart.getProducts();
      const serviceTypeIds = cartItems
        .filter(p => p.serviceTypeId)
        .map(p => p.serviceTypeId);

      const result = await BackendAPI.registerTenant({
        email,
        name,
        password,
        companyName,
        spapiOauthCode: oauthCode,
        sellingPartnerId: sellingPartnerId || '',
        storeName: companyName,
        serviceTypeIds,
        products: cartItems.map(p => ({ slug: p.slug, name: p.name }))
      });

      // Save subscriptions to Supabase too
      if (cartItems.length > 0) {
        try {
          await UserDB.addSubscriptions(cartItems);
        } catch (e) {
          console.warn('Failed to save subscriptions to Supabase:', e);
        }
      }

      // Show success
      showSuccess(result, email, cartItems);
      Cart.clear();

    } catch (error) {
      console.error('Registration error:', error);
      Toast.show('Registration Failed', error.message || 'Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Create Account & Start Trial →';
    }
  }

  function showSuccess(result, email, items) {
    const authTitle = document.getElementById('authTitle');
    const authDesc = document.getElementById('authDesc');
    const authContent = document.getElementById('authContent');

    authTitle.textContent = "You're All Set!";
    authDesc.textContent = '';

    // Check if any cart items have integrations (Veeqo, ShipStation, etc.)
    const integrations = [];
    items.forEach(p => {
      if (p.integrations && p.integrations.length > 0) {
        p.integrations.forEach(intg => {
          const platformName = intg.platform.charAt(0).toUpperCase() + intg.platform.slice(1);
          if (!integrations.includes(platformName)) integrations.push(platformName);
        });
      }
    });

    const integrationMsg = integrations.length > 0
      ? `<li style="display:flex; align-items:flex-start; gap:10px; font-size:0.88rem; color:var(--accent);">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0; margin-top:2px;"><path d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20 10 10 0 000-20z"/></svg>
          <span>After registration, you can check your ${integrations.join(' / ')} data within 2 hours.</span>
        </li>`
      : '';

    authContent.innerHTML = `
      <div class="success-container">
        <div class="success-icon">
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="48" height="48"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2>Your Free Trial Has Started!</h2>
        <p style="color:var(--text-secondary);">
          Signed in as <strong>${email}</strong>.<br>
          ${sellingPartnerId ? `Seller ID: <strong>${sellingPartnerId}</strong><br>` : ''}
          We're setting up <strong>${items.length} tool${items.length !== 1 ? 's' : ''}</strong> for your store.
        </p>
        <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:24px; text-align:left; margin:24px 0 32px;">
          <h4 style="margin-bottom:12px; font-size:0.92rem;">What happens next:</h4>
          <ul style="display:flex; flex-direction:column; gap:10px; list-style:none;">
            <li style="display:flex; align-items:flex-start; gap:10px; font-size:0.88rem; color:var(--text-secondary);">
              <svg width="18" height="18" fill="none" stroke="var(--green)" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0; margin-top:2px;"><polyline points="20 6 9 17 4 12"/></svg>
              <span>Your tools are now active in your dashboard</span>
            </li>
            <li style="display:flex; align-items:flex-start; gap:10px; font-size:0.88rem; color:var(--text-secondary);">
              <svg width="18" height="18" fill="none" stroke="var(--green)" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0; margin-top:2px;"><polyline points="20 6 9 17 4 12"/></svg>
              <span>Data will start syncing Amazon data automatically</span>
            </li>
            <li style="display:flex; align-items:flex-start; gap:10px; font-size:0.88rem; color:var(--text-secondary);">
              <svg width="18" height="18" fill="none" stroke="var(--green)" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0; margin-top:2px;"><polyline points="20 6 9 17 4 12"/></svg>
              <span>You'll be reminded before any charge at the end of your trial</span>
            </li>
            ${integrationMsg}
          </ul>
        </div>
        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
          <a href="../dashboard.html" class="btn-primary">Go to Dashboard</a>
          <a href="../index.html" class="btn-secondary">Back to Home</a>
        </div>
      </div>
    `;
  }

  function showError(titleEl, contentEl, message) {
    titleEl.textContent = 'Authorization Failed';
    contentEl.innerHTML = `
      <div class="success-container">
        <div class="success-icon" style="background:rgba(239,68,68,0.1); color:#ef4444;">
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </div>
        <h2>Something went wrong</h2>
        <p style="color:var(--text-secondary);">${message}</p>
        <div style="display:flex; gap:12px; justify-content:center; margin-top:24px;">
          <a href="../cart.html" class="btn-primary">Try Again</a>
          <a href="../index.html" class="btn-secondary">Back to Home</a>
        </div>
      </div>
    `;
  }

  processAuthorization();
</script>

<style>
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.95); }
  }
</style>
</body>
</html>
